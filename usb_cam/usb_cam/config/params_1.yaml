/**:
    ros__parameters:
      video_device: "/dev/video0"
      framerate: 30.0
      io_method: "mmap"
      frame_id: "camera_l"
      pixel_format: "mjpeg2rgb"  # see usb_cam/supported_formats for list of supported formats
      av_device_format: "YUV422P"
      image_width: 640
      image_height: 360
      camera_name: "camera_l"
      camera_info_url: "package://usb_cam/config/camera_info.yaml"
      brightness: -1
      contrast: -1
      saturation: -1
      sharpness: -1
      gain: -1
      auto_white_balance: false
      white_balance: 4000
      autoexposure: false
      exposure: 100
      autofocus: false
      focus: -1

# """
# This driver supports the following formats:
# 	rgb8
# 	yuyv
# 	yuyv2rgb
# 	uyvy
# 	uyvy2rgb
# 	mono8
# 	mono16
# 	y102mono8
# 	raw_mjpeg
# 	mjpeg2rgb
# 	m4202rgb

# """